version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: baas-portal-db
    environment:
      POSTGRES_USER: ${DB_USER:-baas_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_123}
      POSTGRES_DB: ${DB_NAME:-baas_portal}
      # POSTGRES_INITDB_ARGS: "-c ssl=on -c ssl_cert_file=/etc/ssl/certs/server.crt -c ssl_key_file=/etc/ssl/private/server.key"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # - ./certs/db:/etc/ssl/certs
      # - ./certs/db:/etc/ssl/private
    ports:
      - "5444:5432"
    networks:
      - baas-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-baas_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: baas-portal-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secure_123}
    volumes:
      - redis_data:/data
    ports:
      - "6399:6379"
    networks:
      - baas-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # Keycloak Authentication
  keycloak:
    image: keycloak/keycloak:22.0
    container_name: baas-portal-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin123}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: ${DB_USER:-baas_user}
      KC_DB_PASSWORD: ${DB_PASSWORD:-secure_password_123}
      KC_PROXY: edge
      KC_HTTP_ENABLED: "true"
    ports:
      - "8099:8080"
    networks:
      - baas-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # Backend API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: baas-portal-api
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-baas_user}:${DB_PASSWORD:-secure_password_123}@postgres:5432/${DB_NAME:-baas_portal}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secure_123}@redis:6379
      KEYCLOAK_URL: http://keycloak:8080
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
    ports:
      - "3000:3000"
    networks:
      - baas-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  # Frontend (Nginx)
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: baas-portal-web
    ports:
      - "80:80"
      - "443:443"
    networks:
      - baas-network
    depends_on:
      - backend
    volumes:
      - ./certs/nginx:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # Monitoring - Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: baas-portal-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9091:9090"
    networks:
      - baas-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped

  # Monitoring - Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: baas-portal-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3099:3000"
    networks:
      - baas-network
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  baas-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
